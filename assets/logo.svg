<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="56%">
      <stop offset="0%"   stop-color="#1A2E4A"/>
      <stop offset="100%" stop-color="#07111E"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
    </filter>
    <clipPath id="circ">
      <circle cx="256" cy="256" r="218"/>
    </clipPath>
  </defs>

  <!-- Circular background (transparent outside) -->
  <circle cx="256" cy="256" r="218" fill="url(#bg)"/>

  <!-- Subtle border ring -->
  <circle cx="256" cy="256" r="218" fill="none"
          stroke="#2A4A72" stroke-width="4"/>

  <!-- Glow behind arrow, clipped to circle -->
  <g clip-path="url(#circ)">
    <path d="M256,79 L410,383 L256,283 L102,383 Z"
          fill="#2196F3" opacity="0.55" filter="url(#glow)"/>
  </g>

  <!-- Delta wing arrow — same proportions as in-app pointer -->
  <path d="M256,79 L410,383 L256,283 L102,383 Z"
        fill="#2196F3"
        stroke="white"
        stroke-width="13"
        stroke-linejoin="round"/>
</svg>
