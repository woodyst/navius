<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="stylesheet" href="maplibre-gl.css">
  <script src="maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #map { width: 100%; height: 100%; }

    /* Position MapLibre controls clear of QML overlays */
    .maplibregl-ctrl-top-left    { top:    80px; left:  8px;  }
    .maplibregl-ctrl-top-right   { top:    80px; right: 8px;  }
    .maplibregl-ctrl-bottom-left { bottom: 56px; left:  8px;  }
    .maplibregl-ctrl-bottom-right{ bottom: 56px; right: 8px;  }

    /* Scale bar style */
    .maplibregl-ctrl-scale {
      background: rgba(13,13,26,0.75);
      border-color: rgba(255,255,255,0.6);
      color: white;
      font-size: 11px;
      font-weight: bold;
    }

    /* Zoom buttons style */
    .maplibregl-ctrl-zoom-in  span,
    .maplibregl-ctrl-zoom-out span { color: white; }
    .maplibregl-ctrl-group {
      background: rgba(18,18,42,0.85);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .maplibregl-ctrl-group button { background: transparent; }
    .maplibregl-ctrl-group button:hover { background: rgba(255,255,255,0.1); }

    /* Attribution */
    .maplibregl-ctrl-attrib {
      background: rgba(13,13,26,0.6);
      color: rgba(255,255,255,0.5);
      font-size: 9px;
    }
    .maplibregl-ctrl-attrib a { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    var followMode = true;
    var map, posMarker, mapReady = false;
    var pendingPos = null;

    map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: [-3.7038, 40.4168],
      zoom: 16,
      pitchWithRotate: false
    });

    // Zoom controls (right side)
    map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'bottom-right');

    // Scale bar (bottom-left)
    map.addControl(new maplibregl.ScaleControl({ maxWidth: 120, unit: 'metric' }), 'bottom-left');

    // User drag → stop following
    map.on('dragstart', function() { followMode = false; });

    // Custom GPS marker element
    var el = document.createElement('div');
    el.style.cssText = [
      'width:20px', 'height:20px', 'border-radius:50%',
      'background:#2196F3', 'border:3px solid white',
      'box-shadow:0 0 0 2px rgba(33,150,243,0.4)',
      'cursor:default'
    ].join(';');
    posMarker = new maplibregl.Marker({ element: el });

    // Accuracy + position source/layers added after map loads
    map.on('load', function() {
      mapReady = true;

      map.addSource('accuracy', {
        type: 'geojson',
        data: { type: 'Feature', geometry: { type: 'Polygon', coordinates: [[]] } }
      });
      map.addLayer({
        id: 'accuracy-fill',
        type: 'fill',
        source: 'accuracy',
        paint: { 'fill-color': '#2196F3', 'fill-opacity': 0.12 }
      });
      map.addLayer({
        id: 'accuracy-line',
        type: 'line',
        source: 'accuracy',
        paint: { 'line-color': '#2196F3', 'line-width': 1.5, 'line-opacity': 0.5 }
      });

      if (pendingPos) {
        navius.updatePosition(pendingPos[0], pendingPos[1], pendingPos[2]);
        pendingPos = null;
      }
    });

    // Approx circle polygon for accuracy radius
    function accuracyPolygon(lon, lat, radiusM) {
      var pts = 48, coords = [];
      var dLat = radiusM / 111320;
      var dLon = radiusM / (111320 * Math.cos(lat * Math.PI / 180));
      for (var i = 0; i <= pts; i++) {
        var a = (i / pts) * 2 * Math.PI;
        coords.push([lon + dLon * Math.sin(a), lat + dLat * Math.cos(a)]);
      }
      return { type: 'Feature', geometry: { type: 'Polygon', coordinates: [coords] } };
    }

    // Public API called from Qt via runJavaScript
    var navius = {
      updatePosition: function(lat, lon, accuracy) {
        if (!mapReady) { pendingPos = [lat, lon, accuracy]; return; }
        var lngLat = [lon, lat];
        posMarker.setLngLat(lngLat).addTo(map);
        if (followMode) {
          map.easeTo({ center: lngLat, duration: 400 });
        }
        if (accuracy > 0) {
          map.getSource('accuracy').setData(accuracyPolygon(lon, lat, accuracy));
        }
      },
      recenter: function() {
        followMode = true;
        var pos = posMarker.getLngLat ? posMarker.getLngLat() : null;
        if (pos) map.easeTo({ center: pos, duration: 400 });
      }
    };
  </script>
</body>
</html>
